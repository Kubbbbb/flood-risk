<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=GoogleMapsKey &libraries=places&language=th&region=TH"></script>
  <title>ศูนย์พักพิง | FloodSense</title>
  <style>
    .sidebar-profile-wrapper { position: relative; display: flex; align-items: center; gap: 4px; margin-top: auto; }
    .sidebar-profile-card { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 10px; text-decoration: none; transition: background 0.2s; }
    .sidebar-profile-card:hover { background: rgba(255,255,255,0.12); }
    .sidebar-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #2d86bf; }
    .sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .sidebar-user-info { min-width: 0; }
    .sidebar-display-name { display: block; font-size: 0.85rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-username-handle { display: block; font-size: 0.72rem; color: #a9c8d1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-dots-btn { flex-shrink: 0; width: 30px; height: 30px; border-radius: 6px; background: transparent; border: none; color: #a9c8d1; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s, color 0.2s; }
    .sidebar-dots-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .sidebar-profile-menu { display: none; position: absolute; bottom: calc(100% + 6px); right: 0; background: #1a3a4a; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 6px; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 100; }
    .sidebar-profile-menu.open { display: block; }
    .sidebar-menu-item { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 10px; border-radius: 7px; font-size: 0.84rem; font-weight: 500; color: #e2f2f7; background: transparent; border: none; cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .sidebar-menu-item:hover { background: rgba(255,255,255,0.08); }
    .sidebar-menu-item.danger { color: #f87171; }
    .sidebar-menu-item.danger:hover { background: rgba(248,113,113,0.12); }

    /* Shelter layout */
    .shelter-layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; align-items: start; }
    @media (max-width: 900px) { .shelter-layout { grid-template-columns: 1fr; } }

    .shelter-card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 16px; margin-bottom: 10px;
      transition: box-shadow 0.15s;
    }
    .shelter-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .shelter-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .shelter-card-name { font-size: 0.95rem; font-weight: 700; color: var(--ink); margin: 0; }
    .shelter-status-badge {
      flex-shrink: 0; font-size: 0.7rem; font-weight: 700;
      padding: 3px 10px; border-radius: 999px;
    }
    .shelter-status-badge.open { background: rgba(22,163,74,0.12); color: #16a34a; }
    .shelter-status-badge.full { background: rgba(220,38,38,0.12); color: #dc2626; }
    .shelter-status-badge.closed { background: var(--line); color: var(--muted); }
    .shelter-meta { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
    .shelter-capacity-bar { height: 4px; background: var(--line); border-radius: 2px; margin-bottom: 8px; }
    .shelter-capacity-fill { height: 100%; border-radius: 2px; background: #16a34a; transition: width 0.3s; }
    .shelter-capacity-fill.warn { background: #d97706; }
    .shelter-capacity-fill.full { background: #dc2626; }
    .shelter-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .shelter-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 999px; background: var(--surface); color: var(--muted); border: 1px solid var(--line); }
    .shelter-actions { display: flex; gap: 8px; margin-top: 10px; }
    .shelter-map-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.78rem; font-weight: 600; color: var(--river);
      background: rgba(45,134,191,0.08); border: 1px solid rgba(45,134,191,0.2);
      border-radius: 7px; padding: 5px 12px; cursor: pointer; text-decoration: none;
      transition: background 0.15s;
    }
    .shelter-map-btn:hover { background: rgba(45,134,191,0.15); }
    .shelter-delete-btn {
      font-size: 0.78rem; font-weight: 600; color: #dc2626;
      background: none; border: none; cursor: pointer; padding: 5px 8px;
      border-radius: 7px; transition: background 0.15s;
    }
    .shelter-delete-btn:hover { background: rgba(220,38,38,0.08); }
    .shelter-edit-btn {
      font-size: 0.78rem; font-weight: 600; color: var(--river);
      background: none; border: none; cursor: pointer; padding: 5px 8px;
      border-radius: 7px; transition: background 0.15s;
    }
    .shelter-edit-btn:hover { background: rgba(45,134,191,0.08); }

    /* Form */
    .shelter-form-panel {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 18px; position: sticky; top: 20px;
    }
    .shelter-form-panel h3 { margin: 0 0 14px; font-size: 0.95rem; color: var(--ink); }
    .form-field { margin-bottom: 12px; }
    .form-field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .form-field input, .form-field textarea, .form-field select {
      width: 100%; box-sizing: border-box;
      border: 1px solid var(--line); border-radius: 8px;
      padding: 8px 10px; font-family: inherit; font-size: 0.86rem;
      color: var(--ink); background: var(--surface); outline: none;
    }
    .form-field input:focus, .form-field textarea:focus, .form-field select:focus { border-color: #2d86bf; }
    .form-field textarea { resize: vertical; min-height: 70px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-checkboxes { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-checkbox { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--ink); cursor: pointer; }
    .location-search-wrap { position: relative; }
    .location-ac { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 99; overflow: hidden; }
    .location-ac-item { padding: 9px 12px; cursor: pointer; font-size: 0.84rem; }
    .location-ac-item:hover { background: var(--surface); }
    .location-ac-main { font-weight: 600; color: var(--ink); }
    .location-ac-sub { font-size: 0.74rem; color: var(--muted); }
    .location-selected { font-size: 0.74rem; color: var(--river); margin-top: 4px; }
    .submit-btn {
      width: 100%; padding: 10px; border-radius: 8px;
      background: #2d86bf; color: #fff; border: none;
      font-family: inherit; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .submit-btn:hover { background: #1a6a9e; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty-shelters { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.88rem; }
  </style>
</head>

            <form id="shelterForm">

                <input id="sName" placeholder="เช่น วัดหนองแวง" required>

              <div class="form-field">
                <label>ที่อยู่ / รายละเอียด</label>

  <script src="js/bundle.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient('DatabaseLink','DatabaseKey');
    let currentUser = null;
    let selectedLat = null, selectedLng = null;
    let acSvc = null, acToken = null;

    function makeInitialsAvatar(text) {
      const initial = (text||'?').charAt(0).toUpperCase();
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300"><rect width="300" height="300" fill="#2d86bf"/><text x="150" y="175" font-size="140" font-family="Sarabun,sans-serif" font-weight="700" fill="white" text-anchor="middle">${initial}</text></svg>`;
      return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function timeAgo(d) {
      const diff = (Date.now() - new Date(d)) / 1000;
      if (diff < 3600) return Math.floor(diff/60) + ' นาทีที่แล้ว';
      if (diff < 86400) return Math.floor(diff/3600) + ' ชม.ที่แล้ว';
      return Math.floor(diff/86400) + ' วันที่แล้ว';
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'auth.html'; return; }
      currentUser = session.user;

      const { data: profile } = await sb.from('profiles').select('username,display_name,avatar_url').eq('id', currentUser.id).single();
      const emailPrefix = currentUser.email.split('@')[0];
      const username = profile?.username || emailPrefix;
      const displayName = profile?.display_name || emailPrefix;
      document.getElementById('sidebarDisplayName').textContent = displayName;
      document.getElementById('sidebarUsernameHandle').textContent = '@' + username;
      const avUrl = profile?.avatar_url
        ? sb.storage.from('avatars').getPublicUrl(profile.avatar_url).data?.publicUrl || makeInitialsAvatar(username)
        : makeInitialsAvatar(username);
      document.getElementById('sidebarAvatarImg').src = avUrl;

      loadShelters();
    }

    async function loadShelters() {
      const { data: shelters } = await sb.from('shelters')
        .select('*, profiles!shelters_user_id_fkey(username, display_name)')
        .order('created_at', { ascending: false });

      const list = document.getElementById('shelterList');
      if (!shelters || shelters.length === 0) {
        list.innerHTML = '<div class="empty-shelters">ยังไม่มีศูนย์พักพิงในระบบ<br>เป็นคนแรกที่เพิ่มข้อมูล</div>';
        return;
      }

      list.innerHTML = shelters.map(s => {
        const pct = s.capacity > 0 ? Math.round(s.current_count / s.capacity * 100) : 0;
        const fillClass = pct >= 90 ? 'full' : pct >= 70 ? 'warn' : '';
        const statusLabel = { open: 'เปิดรับ', full: 'เต็มแล้ว', closed: 'ปิดแล้ว' }[s.status] || s.status;
        const tags = [];
        if (s.accepts_pets) tags.push('🐾 รับสัตว์เลี้ยง');
        if (s.accepts_elderly) tags.push('👴 รองรับผู้สูงอายุ');
        const reporter = s.profiles?.display_name || s.profiles?.username || 'ผู้ใช้';
        const mapLink = s.latitude && s.longitude
          ? `<a href="map.html?lat=${s.latitude}&lng=${s.longitude}&zoom=16" class="shelter-map-btn">
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 6 6-3 6 3 6-3v15l-6 3-6-3-6 3Z"></path></svg>ดูบนแผนที่
            </a>` : '';
        const isOwner = s.user_id === currentUser?.id;
        const deleteBtn = isOwner ? `<button class="shelter-delete-btn" onclick="deleteShelter('${s.id}')">ลบ</button>` : '';
        const editBtn   = isOwner ? `<button class="shelter-edit-btn" onclick="openEditShelter('${s.id}')">แก้ไข</button>` : '';

        return `<div class="shelter-card">
          <div class="shelter-card-head">
            <h4 class="shelter-card-name">${s.name}</h4>
            <span class="shelter-status-badge ${s.status}">${statusLabel}</span>
          </div>
          <div class="shelter-meta">
            ${s.description ? s.description + '<br>' : ''}
            ${s.capacity > 0 ? `ความจุ ${s.current_count || 0}/${s.capacity} คน (${pct}%) · ` : ''}
            รายงานโดย ${reporter} · ${timeAgo(s.created_at)}
          </div>
          ${s.capacity > 0 ? `<div class="shelter-capacity-bar"><div class="shelter-capacity-fill ${fillClass}" style="width:${Math.min(pct,100)}%"></div></div>` : ''}
          ${tags.length ? `<div class="shelter-tags">${tags.map(t => `<span class="shelter-tag">${t}</span>`).join('')}</div>` : ''}
          <div class="shelter-actions">${mapLink}${editBtn}${deleteBtn}</div>
        </div>`;
      }).join('');
    }

    async function deleteShelter(id) {
      if (!confirm('ลบศูนย์พักพิงนี้?')) return;
      const { error } = await sb.from('shelters').delete().eq('id', id);
      if (error) showToast('ลบไม่สำเร็จ: ' + error.message);
      else { showToast('ลบแล้ว'); loadShelters(); }
    }

    // Location autocomplete
    let acDebounce;
    document.getElementById('sLocationSearch').addEventListener('input', (e) => {
      clearTimeout(acDebounce);
      const val = e.target.value.trim();
      const dd = document.getElementById('sLocationAc');
      if (val.length < 2) { dd.style.display = 'none'; return; }
      dd.style.display = 'block';
      dd.innerHTML = '<div class="location-ac-item" style="color:var(--muted)">กำลังค้นหา...</div>';
      acDebounce = setTimeout(() => {
        if (!window.google) return;
        if (!acSvc) acSvc = new google.maps.places.AutocompleteService();
        if (!acToken) acToken = new google.maps.places.AutocompleteSessionToken();
        acSvc.getPlacePredictions({ input: val, sessionToken: acToken, componentRestrictions: { country: 'TH' }, language: 'th' }, (preds, status) => {
          dd.innerHTML = '';
          if (status !== google.maps.places.PlacesServiceStatus.OK || !preds) {
            dd.innerHTML = '<div class="location-ac-item" style="color:var(--muted)">ไม่พบสถานที่</div>';
            return;
          }
          preds.forEach(p => {
            const item = document.createElement('div');
            item.className = 'location-ac-item';
            item.innerHTML = `<div class="location-ac-main">${p.structured_formatting.main_text}</div><div class="location-ac-sub">${p.structured_formatting.secondary_text || ''}</div>`;
            item.addEventListener('mousedown', (ev) => {
              ev.preventDefault();
              const div = document.createElement('div');
              new google.maps.places.PlacesService(div).getDetails(
                { placeId: p.place_id, fields: ['geometry', 'name', 'formatted_address'], sessionToken: acToken },
                (place, st) => {
                  if (st === google.maps.places.PlacesServiceStatus.OK && place.geometry) {
                    selectedLat = place.geometry.location.lat();
                    selectedLng = place.geometry.location.lng();
                    document.getElementById('sLocationSearch').value = place.name;
                    document.getElementById('sLocationSelected').textContent = `📍 ${selectedLat.toFixed(5)}, ${selectedLng.toFixed(5)}`;
                    acToken = new google.maps.places.AutocompleteSessionToken();
                  }
                }
              );
              dd.style.display = 'none';
            });
            dd.appendChild(item);
          });
        });
      }, 300);
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.location-search-wrap'))
        document.getElementById('sLocationAc').style.display = 'none';
    });

    document.getElementById('shelterForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedLat || !selectedLng) { showToast('กรุณาเลือกตำแหน่งจากรายการค้นหา'); return; }
      const btn = document.getElementById('shelterSubmitBtn');
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

      const { error } = await sb.from('shelters').insert({
        user_id: currentUser.id,
        name: document.getElementById('sName').value.trim(),
        description: document.getElementById('sDesc').value.trim() || null,
        latitude: selectedLat, longitude: selectedLng,
        capacity: parseInt(document.getElementById('sCapacity').value) || 0,
        current_count: parseInt(document.getElementById('sCurrent').value) || 0,
        status: document.getElementById('sStatus').value,
        accepts_pets: document.getElementById('sPets').checked,
        accepts_elderly: document.getElementById('sElderly').checked,
      });

      btn.disabled = false; btn.textContent = 'บันทึกศูนย์พักพิง';
      if (error) { showToast('บันทึกไม่สำเร็จ: ' + error.message); return; }

      // reset form
      document.getElementById('shelterForm').reset();
      selectedLat = selectedLng = null;
      document.getElementById('sLocationSelected').textContent = '';
      showToast('บันทึกศูนย์พักพิงแล้ว');
      loadShelters();
    });


    function openEditShelter(id) {
      // หาข้อมูลจาก DOM ที่โหลดมาแล้ว โดย query supabase
      sb.from('shelters').select('*').eq('id', id).single().then(({ data: s }) => {
        if (!s) return;
        document.getElementById('editShelterId').value = s.id;
        document.getElementById('editName').value = s.name || '';
        document.getElementById('editDesc').value = s.description || '';
        document.getElementById('editCapacity').value = s.capacity || '';
        document.getElementById('editCurrent').value = s.current_count || '';
        document.getElementById('editStatus').value = s.status || 'open';
        document.getElementById('editPets').checked = s.accepts_pets || false;
        document.getElementById('editElderly').checked = s.accepts_elderly || false;

        const modal = document.getElementById('editShelterModal');
        modal.style.display = 'flex';
      });
    }

    function closeEditModal() {
      document.getElementById('editShelterModal').style.display = 'none';
    }

    document.getElementById('editShelterModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('editShelterModal')) closeEditModal();
    });

    document.getElementById('editShelterForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editShelterId').value;
      const btn = document.getElementById('editSubmitBtn');
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

      const { error } = await sb.from('shelters').update({
        name: document.getElementById('editName').value.trim(),
        description: document.getElementById('editDesc').value.trim() || null,
        capacity: parseInt(document.getElementById('editCapacity').value) || 0,
        current_count: parseInt(document.getElementById('editCurrent').value) || 0,
        status: document.getElementById('editStatus').value,
        accepts_pets: document.getElementById('editPets').checked,
        accepts_elderly: document.getElementById('editElderly').checked,
        updated_at: new Date().toISOString()
      }).eq('id', id);

      btn.disabled = false; btn.textContent = 'บันทึกการแก้ไข';
      if (error) { showToast('แก้ไขไม่สำเร็จ: ' + error.message); return; }
      showToast('แก้ไขเรียบร้อยแล้ว');
      closeEditModal();
      loadShelters();
    });

    function toggleProfileMenu(e) {
      e.preventDefault(); e.stopPropagation();
      document.getElementById('sidebarProfileMenu').classList.toggle('open');
    }
    document.addEventListener('click', () => document.getElementById('sidebarProfileMenu')?.classList.remove('open'));
    async function signOut() { await sb.auth.signOut(); window.location.href = 'auth.html'; }

    init();
  </script>
</body>
</html>
